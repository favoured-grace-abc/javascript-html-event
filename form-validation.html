<!-- Create a form with a name input and a submit button. On submit:

- Prevent the page from reloading
- If the input is empty, show: `"Name is required"`
- If the input has text, show: `"Welcome, [name]!"`

**Hint:** Use `event.preventDefault()` and check `input.value.trim()`. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="m-auto p-0 bg-gray-100 h-screen flex flex-col gap-20 justify-center items-center">
    <form action="" class="flex flex-col w-1/2 h-1/2 bg-gray-400 items-center justify-center gap-10 rounded-md shadow-md p-6">
    <div class="flex flex-col  h-full w-full items-center justify-center gap-4">
    
        <label for="name" class="p-4 text-2xl font-semibold text-center rounded-md bg-gray-500 text-white hover:bg-blue-700 active:bg-red-700 transition-colors duration-300"> FullName:</label>
        <input type="text" name="name" id="name" placeholder="Enter Your FullName" class="bg-gray-100 w-1/2 h-[60px] placeholder:text-center rounded-md ">
        
    </div>
    <button type="submit" class="w-fit h-fit p-6 rounded-md bg-gray-600 text-white font-semibold
        hover:bg-blue-700 active:bg-red-700 transition-colors duration-300">Submit Form</button>
    </form>
</body>
<script>
    const form = document.querySelector("form");
    const nameInput = document.getElementById("name");
    


    form.addEventListener("submit", (event) => {
        event.preventDefault();
        if (nameInput.value.trim() === "") {
            alert("Name is required");
        } else {
            alert(`Welcome, ${nameInput.value}!`);
        }
    });

</script>

        
</html>
