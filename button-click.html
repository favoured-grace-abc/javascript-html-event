<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body 
 class="m-[auto] p-0 bg-gray-100 h-screen flex flex-col justify-center items-center gap-20">
    <div class="w-[60vw] h-[50vh] bg-green-500 flex p-4 gap-10 items-center rounded-md shadow-md"
    >
           <button
       id="ChooseMe"
       class="w-fit h-fit p-6 rounded-md bg-gray-600 text-white font-semibold
        hover:bg-blue-700 active:bg-red-700 transition-colors duration-300"
       >
        Click Me!
       </button> 

    <p id="displayResult" class="min-w-[60%] h-[30%] bg-[white] p-4 rounded-md text-center font-semibold text-4xl "></p>
       
    </div>
</body>
 <script>
    const ChooseMeButton = document.getElementById("ChooseMe");
    const displayResult = document.getElementById("displayResult");
    let counter = 0;
    ChooseMeButton.addEventListener("click", () => {
        counter++;
        displayResult.textContent = `You have clicked ${counter} times`;
    });


 </script>
</html>
