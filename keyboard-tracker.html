<!-- Display a `<p>` on screen. Whenever the user presses any key, update the paragraph to show: `"Last key pressed: A"` (replacing A with whatever key was pressed).

**Hint:** Listen on `document` for the `keydown` event and use `event.key`. -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body
    class="m-[auto] p-0 bg-gray-100 h-screen flex flex-col justify-center items-center gap-20"
  >
    <div
      class="bg-gray-300 w-full h-[60vh] rounded-md p-15 flex gap-20 flex justify-center items-center gap-20"
    >
      <div class="flex flex-col justify-center items-center gap-6">
        <label for="comment">Type something here:</label>
        <input
          name=""
          id="Comment"
          cols="60"
          rows="10"
          class="border-1 border-[black]"
        >
      </div>
      <p
        id="displayResult"
        class="w-[60%] h-[50%] bg-red-500 text-center rounded-md p-4 text-4xl font-semibold"
      ></p>
    </div>
  </body>
  <script>
    const Comment = document.getElementById("Comment");
    const displayResult = document.getElementById("displayResult");

    function getLastKeyPressed(event) {
        const lastKey = event.key;
        displayResult.textContent = `${lastKey}`;
        
    }

    Comment.addEventListener("keydown", getLastKeyPressed);
    
</script>
</html>
