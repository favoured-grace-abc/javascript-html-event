

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body
    class="m-[auto] p-0 bg-gray-100 h-screen flex flex-col justify-center items-center gap-20"
  >
    <div
      class="bg-gray-300 w-full h-[60vh] rounded-md p-15 flex gap-20 flex justify-center items-center gap-20"
    >
      <div class="flex flex-col justify-center items-center gap-6">
        <label for="comment">Type something here:</label>
        <textarea
          name=""
          id="Comment"
          cols="60"
          rows="10"
          class="border-1 border-[black]"
        ></textarea>
      </div>
      <p
        id="displayResult"
        class="w-[60%] h-[50%] bg-red-500 text-center rounded-md p-4 text-4xl font-semibold"
      ></p>
    </div>
   <script>
    const Comment = document.getElementById("Comment");
    const displayResult = document.getElementById("displayResult");
function countWords (){
    let words = Comment.value.length
    displayResult.textContent = `You have typed ${words} words`
} 

    Comment.addEventListener("input", countWords )
    
</script>
      
  </body>
</html>
